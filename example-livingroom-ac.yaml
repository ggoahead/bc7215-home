esphome:
  name: bc7215-ac-livingroom
  friendly_name: 客厅空调
  platformio_options:
    lib_deps:
      - https://github.com/bitcode-tech/bc7215ac.git#v7.2.0
      - plerup/EspSoftwareSerial@^8.2.0

esp8266:
  board: nodemcuv2

external_components:
  - source:
      type: git
      url: https://github.com/ggoahead/bc7215-home
      ref: main
    components: [bc7215_ac]
    refresh: 0s  # while iterating; switch to a pinned ref + longer refresh once stable
  # Local-checkout alternative while developing on the T430:
  # - source:
  #     type: local
  #     path: components
  #   components: [bc7215_ac]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  power_save_mode: none

logger:

api:

ota:
  - platform: esphome

sensor:
  - platform: dht
    pin: GPIO12
    model: AM2302
    temperature:
      name: "Living Room Temperature"
      id: dht_temp
      accuracy_decimals: 1
      filters:
        #- offset: -2.3 修正板载热源偏差
        - or: # 动态节流与心跳机制
            - delta: 0.2 # 温度绝对值波动 >= 0.2°C 时才上报更新
            - heartbeat: 300s
    humidity:
      name: "Living Room Humidity"
      accuracy_decimals: 0
      filters:
        #- offset: 5.0   # 修正板载热源导致的系统偏差
        - or:
            - delta: 2.0 # 湿度绝对值波动 >= 2% 时才上报更新
            - heartbeat: 300s
    update_interval: 60s

climate:
  - platform: bc7215_ac
    name: "Living Room AC"
    mod_pin: GPIO14
    busy_pin: GPIO4
    rx_pin: GPIO5
    tx_pin: GPIO16
    led_pin: GPIO2
    pair_pin: GPIO0
    sensor: dht_temp
