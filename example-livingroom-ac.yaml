esphome:
  name: bc7215-ac-livingroom
  platformio_options:
    lib_deps:
      - https://github.com/bitcode-tech/bc7215ac.git#v7.2.0
      - plerup/EspSoftwareSerial@^8.2.0

esp8266:
  board: nodemcuv2

external_components:
  - source:
      type: git
      url: https://github.com/ggoahead/bc7215-home
      ref: main
    components: [bc7215_ac]
    refresh: 0s  # while iterating; switch to a pinned ref + longer refresh once stable
  # Local-checkout alternative while developing on the T430:
  # - source:
  #     type: local
  #     path: components
  #   components: [bc7215_ac]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
ota:
  platform: esphome

sensor:
  - platform: dht
    pin: GPIO12
    model: DHT22
    temperature:
      name: "Living Room Temperature"
      id: dht_temp
    humidity:
      name: "Living Room Humidity"
    update_interval: 30s

climate:
  - platform: bc7215_ac
    name: "Living Room AC"
    mod_pin: GPIO14
    busy_pin: GPIO4
    rx_pin: GPIO5
    tx_pin: GPIO16
    led_pin: GPIO2
    pair_pin: GPIO0
    sensor: dht_temp
